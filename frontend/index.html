<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Movie - Movies From Everywhere</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="app">
        <!-- Home view -->
        <div id="home-view">
            <header class="navbar">
                <h1 class="logo">🌍 Your Movie</h1>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search movies..." autocomplete="off" />
                    <button id="clear-search" class="hidden">✕</button>
                </div>
            </header>
            <main>
                <section id="movie-rows"></section>
                <section id="search-results" class="hidden">
                    <h2 id="search-title">Search Results</h2>
                    <div id="search-grid" class="movie-grid"></div>
                </section>
            </main>
        </div>

        <!-- Detail view (hidden by default) -->
        <div id="detail-view" class="hidden">
            <div class="detail-container">
                <button id="back-btn">← Back</button>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
